<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Điểm Danh Chuyền Sản Xuất — CJ FOOD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF7F0;
    --surface:#FFFFFF;
    --surface-alt:#F1ECE0;
    --ink:#20281F;
    --ink-muted:#6B7568;
    --primary:#2F5D3A;
    --primary-dark:#1A3622;
    --primary-soft:#E3ECDF;
    --accent:#C2703D;
    --accent-soft:#F3DDC8;
    --danger:#B8453A;
    --danger-soft:#F6DAD7;
    --success:#3F8350;
    --success-soft:#DDEEE0;
    --warning:#C99A2E;
    --warning-soft:#F4E8C9;
    --student-soft:#E3ECF5;
    --student-ink:#2A4A6B;
    --border:#E2DCCB;
    --radius:10px;
    --shadow:0 1px 2px rgba(32,40,31,0.06), 0 6px 18px rgba(32,40,31,0.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Be Vietnam Pro',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  ::selection{background:var(--accent-soft);}

  /* ===== App shell ===== */
  .app-header{
    position:sticky; top:0; z-index:40;
    background:var(--primary);
    background-image:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);
    color:#fff;
    padding:14px 18px 0 18px;
    box-shadow:0 4px 14px rgba(26,54,34,0.25);
  }
  .header-top{
    display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
    margin-bottom:10px;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-mark{
    width:38px;height:38px;border-radius:9px;
    background:rgba(255,255,255,0.14);
    display:flex;align-items:center;justify-content:center;
    font-size:20px;
    border:1px solid rgba(255,255,255,0.25);
  }
  .brand-text h1{margin:0;font-size:16px;font-weight:800;letter-spacing:0.2px;}
  .brand-text p{margin:0;font-size:11.5px;color:rgba(255,255,255,0.72);font-weight:500;}
  .date-control{display:flex;align-items:center;gap:8px;}
  .date-control label{font-size:11px;color:rgba(255,255,255,0.75);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;}
  .date-control input[type=date]{
    font-family:'JetBrains Mono',monospace;
    background:rgba(255,255,255,0.95);
    border:none;border-radius:7px;
    padding:7px 9px;font-size:13.5px;color:var(--ink);font-weight:600;
  }
  .date-display{
    font-size:12px;color:rgba(255,255,255,0.85);font-weight:600;
    background:rgba(255,255,255,0.12);
    padding:5px 10px;border-radius:99px;
    border:1px solid rgba(255,255,255,0.2);
  }
  .tabs{
    display:flex; gap:4px; overflow-x:auto; padding-bottom:0;
    scrollbar-width:thin;
  }
  .tabs::-webkit-scrollbar{height:4px;}
  .tab-btn{
    flex:0 0 auto;
    background:transparent; border:none; cursor:pointer;
    color:rgba(255,255,255,0.7);
    font-family:inherit; font-weight:600; font-size:13px;
    padding:10px 14px; border-radius:8px 8px 0 0;
    display:flex; align-items:center; gap:6px;
    white-space:nowrap;
    border-bottom:3px solid transparent;
    transition:background .15s, color .15s;
  }
  .tab-btn:hover{background:rgba(255,255,255,0.08); color:#fff;}
  .tab-btn.active{
    background:var(--bg); color:var(--primary-dark);
    border-bottom-color:var(--accent);
  }
  .tab-dot{
    width:7px;height:7px;border-radius:99px;background:var(--accent);
    display:none;
  }
  .tab-btn.has-data .tab-dot{display:inline-block;}
  .tab-btn.active .tab-dot{background:var(--accent);}

  main{max-width:1180px;margin:0 auto;padding:18px 16px 60px 16px;}

  .status-bar{
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    font-size:12.5px;color:var(--ink-muted);margin-bottom:14px;min-height:18px;
  }
  .status-bar.saving{color:var(--accent);font-weight:600;}
  .status-bar.saved{color:var(--success);font-weight:600;}
  .status-bar.error{color:var(--danger);font-weight:600;}

  /* ===== Cards / panels ===== */
  .panel{
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); box-shadow:var(--shadow);
    padding:18px; margin-bottom:16px;
  }
  .panel-head{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    margin-bottom:14px; flex-wrap:wrap;
  }
  .panel-title{display:flex; align-items:center; gap:10px;}
  .panel-title .icon{font-size:22px;}
  .panel-title h2{margin:0;font-size:17px;font-weight:800;color:var(--primary-dark);}
  .panel-title .sub{font-size:12px;color:var(--ink-muted);font-weight:500;}

  .recorder-field{display:flex;align-items:center;gap:8px;}
  .recorder-field label{font-size:12px;font-weight:600;color:var(--ink-muted);}
  .recorder-field input{
    font-family:inherit;border:1px solid var(--border);border-radius:7px;
    padding:6px 10px;font-size:13px;width:160px;background:var(--bg);
  }

  /* gauge */
  .gauge-wrap{display:flex;align-items:center;gap:10px;}
  .gauge-num{display:flex;flex-direction:column;}
  .gauge-num .big{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:20px;line-height:1;color:var(--primary-dark);}
  .gauge-num .lbl{font-size:10.5px;color:var(--ink-muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px;}

  /* ===== Tables ===== */
  .table-scroll{overflow-x:auto;border-radius:8px;border:1px solid var(--border);}
  table.data-table{border-collapse:collapse;width:100%;min-width:760px;font-size:13px;}
  table.data-table thead th{
    background:var(--surface-alt); color:var(--primary-dark);
    font-size:11px; text-transform:uppercase; letter-spacing:.3px;
    font-weight:700; padding:9px 8px; text-align:left;
    border-bottom:1px solid var(--border); white-space:nowrap;
  }
  table.data-table td{
    padding:6px 8px; border-bottom:1px solid var(--border); vertical-align:middle;
  }
  table.data-table tbody tr:hover{background:#FBFAF6;}
  td.company-label{font-weight:700;color:var(--ink);white-space:nowrap;}
  tr.cj-row td.company-label{color:#fff;background:var(--primary);border-radius:6px;padding:6px 10px;}
  tr.cj-row{background:var(--primary-soft);}
  tr.sv-row{background:var(--student-soft);}
  tr.sv-row td.company-label{color:var(--student-ink);}
  td.plan-cell{background:var(--accent-soft);text-align:center;}
  .plan-input{width:56px;text-align:center;}
  .num-input{width:58px;}
  .text-input{width:120px;}
  .mini-input{width:46px;}
  input.num-input,input.plan-input,input.mini-input,input.text-input{
    font-family:'JetBrains Mono',monospace;
    border:1px solid var(--border); border-radius:6px;
    padding:5px 6px; font-size:12.5px; background:var(--bg); color:var(--ink);
  }
  input.text-input{font-family:'Be Vietnam Pro',sans-serif;}
  input:focus{outline:2px solid var(--accent); outline-offset:1px;}
  td.computed{font-family:'JetBrains Mono',monospace;font-weight:700;text-align:center;}
  td.pct-cell{font-weight:700;text-align:center;}
  .pct-ok{color:var(--success);}
  .pct-warn{color:var(--warning);}
  .pct-bad{color:var(--danger);}
  tr.total-row{background:var(--primary-dark);color:#fff;font-weight:800;}
  tr.total-row td{border-bottom:none;}
  tr.total-row .mini-input{background:rgba(255,255,255,0.9);}
  tr.total-row td.computed{color:#fff;}

  .save-row{display:flex;align-items:center;gap:12px;margin-top:14px;flex-wrap:wrap;}
  .btn{
    font-family:inherit; font-weight:700; font-size:13.5px;
    border:none; border-radius:8px; padding:10px 18px; cursor:pointer;
    display:inline-flex; align-items:center; gap:7px;
    transition:transform .08s, box-shadow .15s;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--accent);color:#fff;box-shadow:0 3px 10px rgba(194,112,61,0.35);}
  .btn-primary:hover{background:#A85F32;}
  .btn-ghost{background:var(--surface-alt);color:var(--primary-dark);}
  .btn-ghost:hover{background:var(--border);}
  .btn-sm{padding:6px 12px;font-size:12px;border-radius:7px;}
  .btn-export{background:var(--success);color:#fff;box-shadow:0 3px 10px rgba(63,131,80,0.30);}
  .btn-export:hover{background:#2d6840;}
  .btn-export:disabled{opacity:0.6;cursor:not-allowed;}

  /* charts */
  .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .chart-box{position:relative;height:270px;}
  .chart-trend-box{position:relative;height:240px;}
  .trend-loading{display:flex;align-items:center;gap:8px;padding:20px 0;color:var(--ink-muted);font-size:13px;}
  @media(max-width:700px){.charts-row{grid-template-columns:1fr;} .chart-box{height:240px;} }

  /* ===== KPI cards (summary) ===== */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px;}
  .kpi-card{
    background:var(--surface); border:1px solid var(--border); border-radius:9px;
    padding:13px 14px; box-shadow:var(--shadow);
  }
  .kpi-card .lbl{font-size:11px;color:var(--ink-muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
  .kpi-card .val{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:var(--primary-dark);margin-top:3px;}
  .kpi-card .sub{font-size:11.5px;color:var(--ink-muted);margin-top:2px;}
  .kpi-card.accent .val{color:var(--accent);}
  .kpi-card.danger .val{color:var(--danger);}

  .bar-line{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
  .bar-line:last-child{border-bottom:none;}
  .bar-line .name{width:120px;flex:0 0 120px;font-weight:700;font-size:13px;}
  .bar-track{flex:1;height:14px;background:var(--surface-alt);border-radius:99px;overflow:hidden;position:relative;}
  .bar-fill{height:100%;border-radius:99px;background:var(--success);transition:width .4s;}
  .bar-fill.warn{background:var(--warning);}
  .bar-fill.bad{background:var(--danger);}
  .bar-nums{width:140px;flex:0 0 140px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-muted);}
  .bar-nums b{color:var(--ink);}

  .note-line{padding:7px 0;border-bottom:1px dashed var(--border);font-size:13px;}
  .note-line:last-child{border-bottom:none;}
  .note-line .tag{
    display:inline-block;background:var(--primary-soft);color:var(--primary-dark);
    font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:99px;margin-right:8px;
  }
  .note-line .reason{color:var(--ink-muted);font-style:italic;}

  .history-chips{display:flex;gap:7px;flex-wrap:wrap;}
  .chip{
    font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600;
    background:var(--surface-alt); border:1px solid var(--border); color:var(--ink);
    padding:5px 11px; border-radius:99px; cursor:pointer;
  }
  .chip:hover{background:var(--border);}
  .chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}

  .empty-state{
    text-align:center; padding:30px 16px; color:var(--ink-muted);
  }
  .empty-state .e-icon{font-size:30px;margin-bottom:8px;}

  .loading{display:flex;align-items:center;gap:8px;color:var(--ink-muted);font-size:13px;padding:20px 0;}
  .spinner{
    width:14px;height:14px;border-radius:50%;
    border:2px solid var(--border); border-top-color:var(--accent);
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  @media (max-width:640px){
    .header-top{align-items:flex-start;}
    .panel{padding:13px;}
    .bar-nums{width:110px;flex:0 0 110px;font-size:11px;}
    .bar-line .name{width:90px;flex:0 0 90px;font-size:12px;}
  }
  .config-banner{
    background:var(--danger); color:#fff; font-weight:600; font-size:13px;
    text-align:center; padding:10px 16px; display:none;
  }
  .config-banner a{color:#fff; text-decoration:underline;}
  .config-banner.show{display:block;}
</style>
</head>
<body>

<div class="config-banner" id="config-banner">
  ⚠️ Chưa cấu hình Firebase — dữ liệu sẽ <u>không được lưu</u>. Mở file <code>index.html</code>, tìm <code>firebaseConfig</code> và dán thông tin project của bạn vào (xem README.md đi kèm).
</div>

<div class="app-header">
  <div class="header-top">
    <div class="brand">
      <div class="brand-mark">🥬</div>
      <div class="brand-text">
        <h1>Điểm Danh Chuyền Sản Xuất</h1>
        <p>CJ FOOD — R1 · Nhân sự CJ &amp; OEM</p>
      </div>
    </div>
    <div class="date-control">
      <label for="date-picker">Ngày</label>
      <input type="date" id="date-picker">
      <span class="date-display" id="date-display">—</span>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
</div>

<main>
  <div class="status-bar" id="status-bar"></div>
  <div id="content"></div>
</main>

<!-- Firebase (cấu hình bên dưới, trong script chính) -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<!-- SheetJS for Excel export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- Chart.js + datalabels plugin for dashboard -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>

<script>
(function(){
  "use strict";

  /* ============ CONFIG ============ */
  var OEM = [
    {key:'tdx', label:'TĐX'},
    {key:'htdp', label:'HTĐP'},
    {key:'hkm', label:'HKM'},
    {key:'dpl', label:'DPL'},
    {key:'psas', label:'PSAS'},
    {key:'ddp', label:'DDP'},
    {key:'greenhm', label:'Green HM'}
  ];

  var LINES = [
    {key:'kimchi',    label:'Kimchi',            lineId:'VN12801',  tenLine:'Kimchi',            icon:'🥬', planCJ:50, planOEM:45},
    {key:'ksauce',    label:'Ksauce',             lineId:'VN12802',  tenLine:'Ksauce',            icon:'🌶️', planCJ:11, planOEM:9},
    {key:'rongbien',  label:'Seaweed Seasoning',  lineId:'VN12806A', tenLine:'Seaweed Seasoning', icon:'🌿', planCJ:10, planOEM:30},
    {key:'gimjaban',  label:'Seaweed Gim Jaban',  lineId:'VN12806B', tenLine:'Seaweed Gim Jaban', icon:'🍙', planCJ:8,  planOEM:70},
    {key:'rbsnack',   label:'Seaweed Snack',      lineId:'VN12806C', tenLine:'Seaweed Snack',     icon:'🍘', planCJ:7,  planOEM:7},
    {key:'rollgim',   label:'Seaweed Myoek',      lineId:'VN12806D', tenLine:'Seaweed Myoek',     icon:'🍥', planCJ:0,  planOEM:0},
    {key:'rollgim2',  label:'Seaweed Roll Gim',   lineId:'VN12806E', tenLine:'Seaweed Roll Gim',  icon:'🌀', planCJ:0,  planOEM:0}
  ];

  var SV = [
    {key:'svtt', label:'SVTT', full:'Sinh viên thực tập'},
    {key:'svpt', label:'SVPT', full:'Sinh viên parttime'}
  ];

  var WEEKDAYS_VI = ['Chủ Nhật','Thứ Hai','Thứ Ba','Thứ Tư','Thứ Năm','Thứ Sáu','Thứ Bảy'];

  /* ============ STATE ============ */
  var state = {
    date: todayStr(),
    tab: 'summary',
    lineRecords: {},
    dirty: {},
    datesIndexCache: null
  };

  var _charts = {}; // chart instances, destroyed on re-render

  /* ============ UTIL ============ */
  function todayStr(){
    var d = new Date();
    var y = d.getFullYear();
    var m = String(d.getMonth()+1).padStart(2,'0');
    var day = String(d.getDate()).padStart(2,'0');
    return y+'-'+m+'-'+day;
  }
  function formatDateVi(dateStr){
    var parts = dateStr.split('-');
    var d = new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
    return WEEKDAYS_VI[d.getDay()] + ', ' + parts[2] + '/' + parts[1] + '/' + parts[0];
  }
  function formatTime(ts){
    var d = new Date(ts);
    return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }
  function numVal(v){
    var n = parseFloat(v);
    return isNaN(n) ? 0 : n;
  }
  function escapeAttr(s){
    return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  }
  function escapeHtml(s){
    return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function vang(siso,hiendien){ return (siso||0)-(hiendien||0); }
  function pctOf(siso,hiendien){
    if(!siso) return null;
    return Math.round((vang(siso,hiendien)/siso)*1000)/10;
  }
  function pctLabel(p){ return p===null ? '—' : (p+'%'); }
  function pctClass(p){
    if(p===null) return '';
    if(p<=10) return 'pct-ok';
    if(p<=25) return 'pct-warn';
    return 'pct-bad';
  }
  function barClass(p){
    if(p===null) return '';
    if(p>=90) return '';
    if(p>=75) return 'warn';
    return 'bad';
  }
  function setStatus(msg, kind){
    var el = document.getElementById('status-bar');
    el.className = 'status-bar' + (kind?(' '+kind):'');
    el.textContent = msg;
  }

  /* ============ DEFAULT RECORDS ============ */
  function defaultLineRecord(cfg){
    var oem = {};
    OEM.forEach(function(o){ oem[o.key] = {siso:0,hiendien:0,ghichu:'',lydo:''}; });
    return {
      date:'', lineKey:cfg.key, recorder:'',
      planCJ:cfg.planCJ, planOEM:cfg.planOEM,
      cj:{siso:0,hiendien:0,ghichu:'',lydo:''},
      oem:oem,
      svtt:{siso:0,hiendien:0,ghichu:'',lydo:''},
      svpt:{siso:0,hiendien:0,ghichu:'',lydo:''},
      nhapNsMoi:0, catNs:0,
      updatedAt:null
    };
  }

  /* ============ FIREBASE SETUP ============ */
  // 1) Tạo project tại https://console.firebase.google.com
  // 2) Bật "Firestore Database" (Build > Firestore Database > Create database)
  // 3) Project settings > General > Your apps > biểu tượng Web "</>"  > copy đoạn config
  // 4) Dán đè vào object bên dưới rồi lưu file trước khi deploy.
  // Xem README.md đi kèm để có hướng dẫn đầy đủ từng bước.
 const firebaseConfig = {
  apiKey: "AIzaSyBtltBvrGh1pgrV63Hlq2KlkL4_WRJXLw4",
  authDomain: "cj-food-diem-danh.firebaseapp.com",
  projectId: "cj-food-diem-danh",
  storageBucket: "cj-food-diem-danh.firebasestorage.app",
  messagingSenderId: "448987186288",
  appId: "1:448987186288:web:5ae8b34869c374220520b5"
};
  var FIREBASE_CONFIGURED = firebaseConfig.apiKey !== "YOUR_API_KEY" && !!firebaseConfig.apiKey;
  var db = null;
  if(FIREBASE_CONFIGURED && typeof firebase !== 'undefined'){
    try{
      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
    }catch(e){ console.error('Firebase init failed', e); db = null; }
  }

  /* ============ STORAGE (Firestore) ============ */
  var LINES_COLLECTION = 'attendance_lines';
  var DATES_COLLECTION = 'attendance_dates';
  function docId(date,key){ return date+'__'+key; }

  async function loadLineRecord(date, cfg){
    var def = defaultLineRecord(cfg);
    if(!db) return def;
    try{
      var snap = await db.collection(LINES_COLLECTION).doc(docId(date,cfg.key)).get();
      if(snap.exists){ return Object.assign(def, snap.data()); }
    }catch(e){ console.error('loadLineRecord', e); }
    return def;
  }
  async function saveLineRecord(date, lineKey, record){
    record.date = date;
    record.updatedAt = Date.now();
    if(!db) throw new Error('Firebase chưa được cấu hình');
    await db.collection(LINES_COLLECTION).doc(docId(date,lineKey)).set(record);
    await markDateUsed(date);
  }
  async function markDateUsed(date){
    if(!db) return;
    try{
      await db.collection(DATES_COLLECTION).doc(date).set({date:date}, {merge:true});
      state.datesIndexCache = null;
    }catch(e){ console.error('markDateUsed', e); }
  }
  async function getDatesList(skipCache){
    if(state.datesIndexCache && !skipCache) return state.datesIndexCache;
    if(!db){ state.datesIndexCache = []; return []; }
    try{
      var snap = await db.collection(DATES_COLLECTION).get();
      var list = [];
      snap.forEach(function(d){ list.push(d.id); });
      state.datesIndexCache = list;
      return list;
    }catch(e){
      console.error('getDatesList', e);
      state.datesIndexCache = [];
      return [];
    }
  }

  /* ============ COMPUTE ============ */
  function lineTotals(record){
    var siso = record.cj.siso||0, hiendien = record.cj.hiendien||0;
    OEM.forEach(function(o){
      var r = record.oem[o.key];
      siso += r.siso||0; hiendien += r.hiendien||0;
    });
    siso += record.svtt.siso||0; hiendien += record.svtt.hiendien||0;
    siso += record.svpt.siso||0; hiendien += record.svpt.hiendien||0;
    var kehoach = (record.planCJ||0)+(record.planOEM||0);
    return {siso:siso, hiendien:hiendien, vang:siso-hiendien, pct:pctOf(siso,hiendien), kehoach:kehoach};
  }

  /* ============ GAUGE (SVG ring) ============ */
  function gaugeSvg(id, presentRatio){
    // presentRatio 0..1 of attendance vs plan (capped 0..1.2 visual)
    var r = 26, c = 2*Math.PI*r;
    var clamped = Math.max(0, Math.min(1, presentRatio));
    var offset = c * (1-clamped);
    var color = clamped >= 0.9 ? 'var(--success)' : (clamped >= 0.75 ? 'var(--warning)' : 'var(--danger)');
    return '<svg width="64" height="64" viewBox="0 0 64 64" id="'+id+'">' +
      '<circle cx="32" cy="32" r="'+r+'" fill="none" stroke="var(--surface-alt)" stroke-width="7"/>' +
      '<circle cx="32" cy="32" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="7" stroke-linecap="round" ' +
        'stroke-dasharray="'+c.toFixed(1)+'" stroke-dashoffset="'+offset.toFixed(1)+'" ' +
        'transform="rotate(-90 32 32)" style="transition:stroke-dashoffset .4s, stroke .4s;"/>' +
      '</svg>';
  }

  /* ============ RENDER: TABS ============ */
  var TAB_DEFS = [
    {key:'summary', label:'Tổng Quan', icon:'📊'}
  ].concat(LINES.map(function(l){ return {key:l.key, label:l.label, icon:l.icon}; }));

  function renderTabs(){
    var el = document.getElementById('tabs');
    el.innerHTML = TAB_DEFS.map(function(t){
      var active = t.key === state.tab ? ' active' : '';
      var hasData = state.dirty[t.key] ? ' has-data' : '';
      return '<button class="tab-btn'+active+hasData+'" data-tab="'+t.key+'">'+
        '<span>'+t.icon+'</span><span>'+t.label+'</span><span class="tab-dot"></span></button>';
    }).join('');
    Array.prototype.forEach.call(el.querySelectorAll('.tab-btn'), function(btn){
      btn.addEventListener('click', function(){
        switchTab(btn.getAttribute('data-tab'));
      });
    });
  }

  function switchTab(tabKey){
    if(tabKey === state.tab) return;
    if(state.dirty[state.tab]){
      var ok = confirm('Bạn có thay đổi chưa lưu ở tab hiện tại. Chuyển tab và bỏ qua thay đổi?');
      if(!ok) return;
      state.dirty[state.tab] = false;
    }
    state.tab = tabKey;
    renderTabs();
    renderActiveTab();
  }

  /* ============ RENDER: ACTIVE TAB ROUTER ============ */
  function renderActiveTab(){
    var content = document.getElementById('content');
    setStatus('');
    if(state.tab === 'summary'){
      renderSummaryTab(content);
    } else {
      var cfg = LINES.filter(function(l){ return l.key === state.tab; })[0];
      renderLineTab(content, cfg);
    }
  }

  /* ============ RENDER: LINE TAB ============ */
  async function renderLineTab(content, cfg){
    content.innerHTML = '<div class="loading"><div class="spinner"></div> Đang tải dữ liệu '+cfg.label+'…</div>';
    var date = state.date;
    var record = await loadLineRecord(date, cfg);
    if(state.tab !== cfg.key || state.date !== date) return; // stale
    state.lineRecords[cfg.key] = record;
    state.dirty[cfg.key] = false;

    var totals = lineTotals(record);

    var oemRowsHtml = OEM.map(function(o,i){
      var r = record.oem[o.key];
      var p = pctOf(r.siso, r.hiendien);
      var planCell = i===0
        ? '<td class="plan-cell" rowspan="'+OEM.length+'"><input type="number" min="0" class="plan-input" data-field="planOEM" value="'+escapeAttr(record.planOEM)+'"></td>'
        : '';
      return '<tr>' +
        '<td class="company-label">'+escapeHtml(o.label)+'</td>' +
        planCell +
        '<td><input type="number" min="0" class="num-input" data-field="siso" data-company="'+o.key+'" value="'+escapeAttr(r.siso)+'"></td>' +
        '<td><input type="number" min="0" class="num-input" data-field="hiendien" data-company="'+o.key+'" value="'+escapeAttr(r.hiendien)+'"></td>' +
        '<td class="computed" id="vang-'+o.key+'">'+vang(r.siso,r.hiendien)+'</td>' +
        '<td class="computed pct-cell '+pctClass(p)+'" id="pct-'+o.key+'">'+pctLabel(p)+'</td>' +
        '<td><input type="text" class="text-input" data-field="ghichu" data-company="'+o.key+'" placeholder="Tên NV vắng" value="'+escapeAttr(r.ghichu)+'"></td>' +
        '<td><input type="text" class="text-input" data-field="lydo" data-company="'+o.key+'" placeholder="Lý do" value="'+escapeAttr(r.lydo)+'"></td>' +
        '</tr>';
    }).join('');

    var svRowsHtml = SV.map(function(s){
      var r = record[s.key];
      var p = pctOf(r.siso, r.hiendien);
      return '<tr class="sv-row">' +
        '<td class="company-label" title="'+escapeAttr(s.full)+'">🎓 '+escapeHtml(s.label)+'</td>' +
        '<td class="plan-cell" style="color:var(--ink-muted);">—</td>' +
        '<td><input type="number" min="0" class="num-input" data-field="siso" data-company="'+s.key+'" value="'+escapeAttr(r.siso)+'"></td>' +
        '<td><input type="number" min="0" class="num-input" data-field="hiendien" data-company="'+s.key+'" value="'+escapeAttr(r.hiendien)+'"></td>' +
        '<td class="computed" id="vang-'+s.key+'">'+vang(r.siso,r.hiendien)+'</td>' +
        '<td class="computed pct-cell '+pctClass(p)+'" id="pct-'+s.key+'">'+pctLabel(p)+'</td>' +
        '<td><input type="text" class="text-input" data-field="ghichu" data-company="'+s.key+'" placeholder="Tên SV vắng" value="'+escapeAttr(r.ghichu)+'"></td>' +
        '<td><input type="text" class="text-input" data-field="lydo" data-company="'+s.key+'" placeholder="Lý do" value="'+escapeAttr(r.lydo)+'"></td>' +
        '</tr>';
    }).join('');

    var cjP = pctOf(record.cj.siso, record.cj.hiendien);

    content.innerHTML =
      '<div class="panel">' +
        '<div class="panel-head">' +
          '<div class="panel-title">' +
            '<span class="icon">'+cfg.icon+'</span>' +
            '<div><h2>'+escapeHtml(cfg.label)+'</h2><div class="sub">Điểm danh nhân sự CJ, OEM &amp; Sinh viên</div></div>' +
          '</div>' +
          '<div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap;">' +
            '<div class="recorder-field"><label>Người điểm danh</label>' +
              '<input type="text" id="recorder-input" placeholder="Tên..." value="'+escapeAttr(record.recorder)+'"></div>' +
            '<div class="gauge-wrap">' +
              gaugeSvg('gauge-svg', totals.siso ? (totals.hiendien/Math.max(totals.kehoach,totals.siso,1)) : 0) +
              '<div class="gauge-num"><span class="big" id="gauge-text">'+totals.hiendien+'/'+totals.kehoach+'</span><span class="lbl">Hiện diện / Kế hoạch</span></div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="table-scroll"><table class="data-table">' +
          '<thead><tr>' +
            '<th>Đơn vị</th><th>Kế hoạch</th><th>Sĩ số</th><th>Hiện diện</th><th>Vắng</th><th>%</th><th>Tên NV vắng</th><th>Lý do</th>' +
          '</tr></thead>' +
          '<tbody id="line-tbody">' +
            '<tr class="cj-row">' +
              '<td class="company-label">CJ</td>' +
              '<td class="plan-cell"><input type="number" min="0" class="plan-input" data-field="planCJ" value="'+escapeAttr(record.planCJ)+'"></td>' +
              '<td><input type="number" min="0" class="num-input" data-field="siso" data-company="cj" value="'+escapeAttr(record.cj.siso)+'"></td>' +
              '<td><input type="number" min="0" class="num-input" data-field="hiendien" data-company="cj" value="'+escapeAttr(record.cj.hiendien)+'"></td>' +
              '<td class="computed" id="vang-cj">'+vang(record.cj.siso,record.cj.hiendien)+'</td>' +
              '<td class="computed pct-cell '+pctClass(cjP)+'" id="pct-cj">'+pctLabel(cjP)+'</td>' +
              '<td><input type="text" class="text-input" data-field="ghichu" data-company="cj" placeholder="Tên NV vắng" value="'+escapeAttr(record.cj.ghichu)+'"></td>' +
              '<td><input type="text" class="text-input" data-field="lydo" data-company="cj" placeholder="Lý do" value="'+escapeAttr(record.cj.lydo)+'"></td>' +
            '</tr>' +
            oemRowsHtml +
            svRowsHtml +
            '<tr class="total-row">' +
              '<td>TỔNG '+escapeHtml(cfg.label).toUpperCase()+'</td>' +
              '<td class="computed" id="total-kehoach">'+totals.kehoach+'</td>' +
              '<td class="computed" id="total-siso">'+totals.siso+'</td>' +
              '<td class="computed" id="total-hiendien">'+totals.hiendien+'</td>' +
              '<td class="computed" id="total-vang">'+totals.vang+'</td>' +
              '<td class="computed" id="total-pct">'+pctLabel(totals.pct)+'</td>' +
              '<td colspan="2" style="white-space:nowrap;">' +
                'Nhập NS mới <input type="number" min="0" class="mini-input" data-field="nhapNsMoi" value="'+escapeAttr(record.nhapNsMoi)+'"> &nbsp; ' +
                'Cắt NS <input type="number" min="0" class="mini-input" data-field="catNs" value="'+escapeAttr(record.catNs)+'">' +
              '</td>' +
            '</tr>' +
          '</tbody>' +
        '</table></div>' +
        '<div class="save-row">' +
          '<button class="btn btn-primary" id="save-line-btn">💾 Lưu điểm danh</button>' +
          '<button class="btn btn-ghost" id="reset-line-btn">↺ Tải lại</button>' +
          (record.updatedAt ? '<span class="status-bar saved" style="margin:0;">Đã lưu lần cuối lúc '+formatTime(record.updatedAt)+'</span>' : '<span class="status-bar" style="margin:0;">Chưa có dữ liệu lưu cho ngày này</span>') +
        '</div>' +
      '</div>';

    var tbody = document.getElementById('line-tbody');
    var recorderInput = document.getElementById('recorder-input');

    function markDirty(){ state.dirty[cfg.key] = true; renderTabs(); }

    recorderInput.addEventListener('input', function(){
      record.recorder = recorderInput.value;
      markDirty();
    });

    function updateGauge(){
      var t = lineTotals(record);
      document.getElementById('total-kehoach').textContent = t.kehoach;
      document.getElementById('total-siso').textContent = t.siso;
      document.getElementById('total-hiendien').textContent = t.hiendien;
      document.getElementById('total-vang').textContent = t.vang;
      var pctEl = document.getElementById('total-pct');
      pctEl.textContent = pctLabel(t.pct);
      var gaugeText = document.getElementById('gauge-text');
      if(gaugeText) gaugeText.textContent = t.hiendien+'/'+t.kehoach;
      var gaugeHolder = document.querySelector('.gauge-wrap');
      if(gaugeHolder){
        var ratio = t.kehoach ? (t.hiendien/Math.max(t.kehoach,t.siso,1)) : 0;
        var newSvg = gaugeSvg('gauge-svg', ratio);
        var oldSvg = document.getElementById('gauge-svg');
        if(oldSvg) oldSvg.outerHTML = newSvg;
      }
    }

    tbody.addEventListener('input', function(e){
      var t = e.target;
      var field = t.getAttribute('data-field');
      if(!field) return;
      markDirty();

      if(field === 'planCJ'){ record.planCJ = numVal(t.value); updateGauge(); return; }
      if(field === 'planOEM'){ record.planOEM = numVal(t.value); updateGauge(); return; }
      if(field === 'nhapNsMoi'){ record.nhapNsMoi = numVal(t.value); return; }
      if(field === 'catNs'){ record.catNs = numVal(t.value); return; }

      var company = t.getAttribute('data-company');
      var target = company === 'cj' ? record.cj : (company === 'svtt' || company === 'svpt') ? record[company] : record.oem[company];
      if(!target) return;

      if(field === 'siso' || field === 'hiendien'){
        target[field] = numVal(t.value);
        var p = pctOf(target.siso, target.hiendien);
        var vEl = document.getElementById('vang-'+company);
        var pEl = document.getElementById('pct-'+company);
        if(vEl) vEl.textContent = vang(target.siso, target.hiendien);
        if(pEl){ pEl.textContent = pctLabel(p); pEl.className = 'computed pct-cell '+pctClass(p); }
        updateGauge();
      } else if(field === 'ghichu' || field === 'lydo'){
        target[field] = t.value;
      }
    });

    document.getElementById('save-line-btn').addEventListener('click', async function(){
      setStatus('Đang lưu…', 'saving');
      try{
        await saveLineRecord(date, cfg.key, record);
        state.dirty[cfg.key] = false;
        renderTabs();
        setStatus('Đã lưu điểm danh '+cfg.label+' lúc '+formatTime(Date.now())+' ✓', 'saved');
      }catch(err){
        setStatus(err && err.message === 'Firebase chưa được cấu hình' ? 'Chưa cấu hình Firebase — xem README.md để thiết lập trước khi lưu.' : 'Không thể lưu — kiểm tra kết nối mạng và thử lại.', 'error');
      }
    });
    document.getElementById('reset-line-btn').addEventListener('click', function(){
      if(state.dirty[cfg.key] && !confirm('Tải lại sẽ bỏ qua các thay đổi chưa lưu. Tiếp tục?')) return;
      state.dirty[cfg.key] = false;
      renderActiveTab();
    });
  }

  /* ============ RENDER: SUMMARY TAB ============ */
  async function renderSummaryTab(content){
    content.innerHTML = '<div class="loading"><div class="spinner"></div> Đang tổng hợp dữ liệu ngày '+formatDateVi(state.date)+'…</div>';
    var date = state.date;

    var lineResults = [];
    for(var i=0;i<LINES.length;i++){
      var rec = await loadLineRecord(date, LINES[i]);
      lineResults.push({cfg:LINES[i], record:rec, totals:lineTotals(rec)});
    }
    var dates = await getDatesList();

    if(state.tab !== 'summary' || state.date !== date) return;

    // --- Aggregate per partner across all lines ---
    var partnerMap = {};  // key -> {label, siso, hd}
    partnerMap['cj'] = {label:'CJ', siso:0, hd:0};
    OEM.forEach(function(o){ partnerMap[o.key] = {label:o.label, siso:0, hd:0}; });
    SV.forEach(function(s){ partnerMap[s.key]  = {label:s.label,  siso:0, hd:0}; });

    var totalKehoach=0;
    lineResults.forEach(function(lr){
      partnerMap['cj'].siso += lr.record.cj.siso||0;
      partnerMap['cj'].hd   += lr.record.cj.hiendien||0;
      totalKehoach += lr.totals.kehoach;
      OEM.forEach(function(o){
        var r = lr.record.oem[o.key];
        partnerMap[o.key].siso += r.siso||0;
        partnerMap[o.key].hd   += r.hiendien||0;
      });
      SV.forEach(function(s){
        var r = lr.record[s.key];
        partnerMap[s.key].siso += r.siso||0;
        partnerMap[s.key].hd   += r.hiendien||0;
      });
    });

    var grandSiso = Object.keys(partnerMap).reduce(function(a,k){ return a+partnerMap[k].siso; },0);
    var grandHd   = Object.keys(partnerMap).reduce(function(a,k){ return a+partnerMap[k].hd;   },0);
    var grandVang = grandSiso - grandHd;
    var grandPct  = pctOf(grandSiso, grandHd);
    var presentPct = grandSiso ? Math.round((grandHd/grandSiso)*1000)/10 : null;

    // --- helpers ---
    function kpi(label,val,sub,cls){
      return '<div class="kpi-card'+(cls?(' '+cls):'')+'"><div class="lbl">'+label+'</div><div class="val">'+val+'</div>'+(sub?'<div class="sub">'+sub+'</div>':'')+'</div>';
    }
    function pctOfTotal(part, total){ return total ? Math.round((part/total)*1000)/10 : 0; }

    // --- KPI row ---
    var kpiHtml =
      kpi('Tổng sĩ số', grandSiso, 'CJ + OEM + Sinh viên') +
      kpi('Hiện diện', grandHd, (presentPct===null?'—':presentPct)+'% có mặt') +
      kpi('Vắng', grandVang, pctLabel(grandPct)+' tỷ lệ vắng', grandPct!==null && grandPct>15 ? 'danger':'accent') +
      kpi('Kế hoạch (SX)', totalKehoach, LINES.length+' chuyền sản xuất');

    // --- bar helper ---
    function barLine(name, siso, hd, pctTotalSiso){
      var absenceP = pctOf(siso,hd);
      var fill = siso ? (hd/siso)*100 : 0;
      var shareTxt = pctTotalSiso !== undefined
        ? ' <span style="font-size:10.5px;color:var(--ink-muted);">('+(pctTotalSiso)+'% tổng SS)</span>' : '';
      return '<div class="bar-line"><div class="name">'+escapeHtml(name)+'</div>' +
        '<div class="bar-track"><div class="bar-fill '+barClass(fill)+'" style="width:'+Math.min(100,fill)+'%;"></div></div>' +
        '<div class="bar-nums"><b>'+hd+'</b>/'+siso+' &nbsp;'+pctLabel(absenceP)+' vắng'+shareTxt+'</div></div>';
    }

    // --- Panel 1: Tỉ lệ theo đối tác ---
    var partnerOrder = ['cj'].concat(OEM.map(function(o){return o.key;})).concat(SV.map(function(s){return s.key;}));
    var partnerHtml = partnerOrder.map(function(k){
      var p = partnerMap[k];
      var share = pctOfTotal(p.siso, grandSiso);
      return barLine(p.label, p.siso, p.hd, share);
    }).join('');

    // --- Panel 2: Tỉ lệ theo chuyền ---
    var lineHtml = lineResults.map(function(lr){
      var t = lr.totals;
      var share = pctOfTotal(t.siso, grandSiso);
      var fill = t.kehoach ? Math.min(100,(t.hiendien/t.kehoach)*100) : (t.siso ? Math.min(100,(t.hiendien/t.siso)*100) : 0);
      var absenceP = pctOf(t.siso, t.hiendien);
      return '<div class="bar-line">'+
        '<div class="name">'+lr.cfg.icon+' <span title="'+escapeAttr(lr.cfg.lineId)+'">'+escapeHtml(lr.cfg.label)+'</span></div>'+
        '<div class="bar-track"><div class="bar-fill '+barClass(fill)+'" style="width:'+fill.toFixed(1)+'%;"></div></div>'+
        '<div class="bar-nums"><b>'+t.hiendien+'</b>/KH '+t.kehoach+' &nbsp;'+pctLabel(absenceP)+' vắng'+
          ' <span style="font-size:10.5px;color:var(--ink-muted);">('+share+'% tổng SS)</span></div>'+
        '</div>';
    }).join('');

    // --- absentee notes ---
    var notes = [];
    lineResults.forEach(function(lr){
      if(lr.record.cj.ghichu) notes.push({line:lr.cfg.label, unit:'CJ', names:lr.record.cj.ghichu, reason:lr.record.cj.lydo});
      OEM.forEach(function(o){
        var r = lr.record.oem[o.key];
        if(r.ghichu) notes.push({line:lr.cfg.label, unit:o.label, names:r.ghichu, reason:r.lydo});
      });
      SV.forEach(function(s){
        var r = lr.record[s.key];
        if(r.ghichu) notes.push({line:lr.cfg.label, unit:s.label, names:r.ghichu, reason:r.lydo});
      });
    });
    var notesHtml = notes.length
      ? notes.map(function(n){
          return '<div class="note-line"><span class="tag">'+escapeHtml(n.line)+' · '+escapeHtml(n.unit)+'</span>'+
            escapeHtml(n.names)+(n.reason ? ' <span class="reason">— '+escapeHtml(n.reason)+'</span>':'')+'</div>';
        }).join('')
      : '<div class="empty-state"><div class="e-icon">✅</div>Chưa ghi nhận nhân viên vắng cho ngày này.</div>';

    // --- history ---
    var sortedDates = dates.slice().sort().reverse().slice(0,14);
    var historyHtml = sortedDates.length
      ? '<div class="history-chips">'+sortedDates.map(function(d){
          return '<button class="chip'+(d===date?' active':'')+'" data-date="'+d+'">'+d.split('-').reverse().join('/')+'</button>';
        }).join('')+'</div>'
      : '<div class="empty-state"><div class="e-icon">🗓️</div>Chưa có dữ liệu lịch sử nào được lưu.</div>';

    content.innerHTML =
      '<div class="kpi-grid">'+kpiHtml+'</div>' +

      // --- donut charts row ---
      '<div class="charts-row">' +
        '<div class="panel" style="margin-bottom:0">' +
          '<div class="panel-head"><div class="panel-title"><span class="icon">🥧</span>'+
            '<div><h2>Tỉ trọng theo đối tác</h2><div class="sub">Sĩ số mỗi nhóm / tổng</div></div></div></div>'+
          '<div class="chart-box"><canvas id="chart-partner"></canvas></div>'+
        '</div>' +
        '<div class="panel" style="margin-bottom:0">' +
          '<div class="panel-head"><div class="panel-title"><span class="icon">🏭</span>'+
            '<div><h2>Tỉ trọng theo chuyền</h2><div class="sub">Sĩ số mỗi chuyền / tổng</div></div></div></div>'+
          '<div class="chart-box"><canvas id="chart-line"></canvas></div>'+
        '</div>' +
      '</div>' +

      // --- trend chart ---
      '<div class="panel">' +
        '<div class="panel-head"><div class="panel-title"><span class="icon">📈</span>'+
          '<div><h2>Biến động nhân sự 7 ngày</h2><div class="sub">Hiện diện CJ / OEM / SVTT / SVPT</div></div></div></div>'+
        '<div class="chart-trend-box"><canvas id="chart-trend"></canvas></div>'+
        '<div class="trend-loading" id="trend-loading"><div class="spinner"></div> Đang tải dữ liệu lịch sử…</div>'+
      '</div>' +

      // --- bar panels row ---
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;" class="two-col-panels">' +
        '<div class="panel" style="margin-bottom:0">' +
          '<div class="panel-head"><div class="panel-title"><span class="icon">👥</span>'+
            '<div><h2>Chi tiết theo đối tác</h2><div class="sub">Sĩ số · % vắng · tỉ trọng vs tổng</div></div></div></div>'+
          partnerHtml +
        '</div>' +
        '<div class="panel" style="margin-bottom:0">' +
          '<div class="panel-head"><div class="panel-title"><span class="icon">📊</span>'+
            '<div><h2>Chi tiết theo chuyền</h2><div class="sub">Hiện diện vs kế hoạch · tỉ trọng</div></div></div>'+
            '<div style="display:flex;gap:6px;">'+
              '<button class="btn btn-ghost btn-sm" id="refresh-summary-btn">🔄</button>'+
              '<button class="btn btn-export btn-sm" id="export-btn">📥 Xuất Excel</button>'+
            '</div>'+
          '</div>'+
          lineHtml +
        '</div>' +
      '</div>' +

      '<div class="panel">' +
        '<div class="panel-head"><div class="panel-title"><span class="icon">📝</span>'+
          '<div><h2>Nhân viên vắng trong ngày</h2><div class="sub">Tổng hợp từ tất cả các chuyền</div></div></div></div>'+
        notesHtml +
      '</div>' +
      '<div class="panel">' +
        '<div class="panel-head"><div class="panel-title"><span class="icon">🕘</span>'+
          '<div><h2>Lịch sử</h2><div class="sub">Chọn một ngày để xem lại</div></div></div></div>'+
        historyHtml +
      '</div>';

    // responsive stack
    if(window.innerWidth < 700){
      var twoCol = content.querySelector('.two-col-panels');
      if(twoCol) twoCol.style.gridTemplateColumns = '1fr';
    }

    var refreshBtn = document.getElementById('refresh-summary-btn');
    if(refreshBtn) refreshBtn.addEventListener('click', function(){ renderActiveTab(); });
    var exportBtn = document.getElementById('export-btn');
    if(exportBtn) exportBtn.addEventListener('click', function(){ exportExcel(date); });

    Array.prototype.forEach.call(content.querySelectorAll('.chip'), function(chip){
      chip.addEventListener('click', function(){
        state.date = chip.getAttribute('data-date');
        document.getElementById('date-picker').value = state.date;
        document.getElementById('date-display').textContent = formatDateVi(state.date);
        renderActiveTab();
      });
    });

    // build charts (donuts sync, trend async in background)
    buildDonutCharts(partnerMap, lineResults, grandSiso);
    buildTrendChart(dates, date);
  }

  /* ============ CHARTS ============ */
  var CHART_PALETTE = [
    '#2F5D3A','#C2703D','#3B7BC8','#8E44AD','#16A085',
    '#D35400','#1A5276','#6C3483','#0E6655','#784212',
    '#2E86C1','#117A65'
  ];

  function destroyCharts(){
    ['partner','line','trend'].forEach(function(k){
      if(_charts[k]){ try{ _charts[k].destroy(); }catch(e){} delete _charts[k]; }
    });
  }

  function buildDonutCharts(partnerMap, lineResults, grandSiso){
    if(typeof Chart === 'undefined' || typeof ChartDataLabels === 'undefined') return;
    destroyCharts();

    var DONUT_OPTS = function(labelsFn){
      return {
        responsive:true, maintainAspectRatio:false,
        layout:{ padding:{ top:4, bottom:4 }},
        plugins:{
          legend:{
            position:'right',
            labels:{ font:{size:11,family:'Be Vietnam Pro,sans-serif'}, padding:10, boxWidth:13 }
          },
          datalabels:{
            color:'#fff',
            font:{ weight:'bold', size:11.5, family:'JetBrains Mono,monospace' },
            textShadowBlur:3, textShadowColor:'rgba(0,0,0,0.35)',
            formatter: labelsFn
          }
        },
        animation:{ duration:500 }
      };
    };

    // --- Partner donut ---
    var partnerOrder = ['cj'].concat(OEM.map(function(o){return o.key;}))
                             .concat(SV.map(function(s){return s.key;}));
    var pLabels=[], pData=[], pColors=[];
    partnerOrder.forEach(function(k,i){
      var p = partnerMap[k];
      if(p.siso > 0){ pLabels.push(p.label); pData.push(p.siso); pColors.push(CHART_PALETTE[i%CHART_PALETTE.length]); }
    });

    var ctxP = document.getElementById('chart-partner');
    if(ctxP && pData.length){
      _charts['partner'] = new Chart(ctxP, {
        type:'doughnut',
        plugins:[ChartDataLabels],
        data:{ labels:pLabels, datasets:[{ data:pData, backgroundColor:pColors, borderWidth:3, borderColor:'#fff', hoverOffset:6 }]},
        options: DONUT_OPTS(function(v){
          var pct = grandSiso ? Math.round(v/grandSiso*100) : 0;
          return pct >= 5 ? pct+'%' : '';
        })
      });
    }

    // --- Line donut ---
    var lLabels=[], lData=[], lColors=[];
    lineResults.forEach(function(lr,i){
      if(lr.totals.siso > 0){
        lLabels.push(lr.cfg.label);
        lData.push(lr.totals.siso);
        lColors.push(CHART_PALETTE[(i+2)%CHART_PALETTE.length]);
      }
    });

    var ctxL = document.getElementById('chart-line');
    if(ctxL && lData.length){
      _charts['line'] = new Chart(ctxL, {
        type:'doughnut',
        plugins:[ChartDataLabels],
        data:{ labels:lLabels, datasets:[{ data:lData, backgroundColor:lColors, borderWidth:3, borderColor:'#fff', hoverOffset:6 }]},
        options: DONUT_OPTS(function(v){
          var pct = grandSiso ? Math.round(v/grandSiso*100) : 0;
          return pct >= 5 ? pct+'%' : '';
        })
      });
    }
  }

  async function buildTrendChart(dates, currentDate){
    var trendEl = document.getElementById('chart-trend');
    var loadingEl = document.getElementById('trend-loading');
    if(!trendEl) return;

    // last 7 dates including today if it has data
    var pool = dates.slice();
    if(pool.indexOf(currentDate) === -1) pool.push(currentDate);
    var trendDates = pool.slice().sort().slice(-7);

    if(trendDates.length < 2){
      if(loadingEl) loadingEl.innerHTML = '<span style="color:var(--ink-muted);font-size:12px;">Cần ít nhất 2 ngày dữ liệu để hiển thị biểu đồ xu hướng.</span>';
      return;
    }

    if(loadingEl) loadingEl.style.display = 'flex';
    if(trendEl) trendEl.style.display = 'none';

    try{
      // load all lines for each trend date in parallel
      var points = await Promise.all(trendDates.map(async function(d){
        var parts = d.split('-');
        var MON2 = ['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'];
        var label = parts[2]+'/'+MON2[parseInt(parts[1],10)-1];
        var cjH=0,oemH=0,svttH=0,svptH=0;
        var recs = await Promise.all(LINES.map(function(cfg){ return loadLineRecord(d,cfg); }));
        recs.forEach(function(rec){
          cjH   += rec.cj.hiendien||0;
          OEM.forEach(function(o){ oemH += rec.oem[o.key].hiendien||0; });
          svttH += rec.svtt.hiendien||0;
          svptH += rec.svpt.hiendien||0;
        });
        return {label:label, cj:cjH, oem:oemH, svtt:svttH, svpt:svptH};
      }));

      // check still on summary tab
      if(state.tab !== 'summary') return;
      if(loadingEl) loadingEl.style.display = 'none';
      if(trendEl)   trendEl.style.display = 'block';

      if(_charts['trend']){ try{_charts['trend'].destroy();}catch(e){} }

      var COLORS_TREND = { cj:'#2F5D3A', oem:'#C2703D', svtt:'#3B7BC8', svpt:'#8E44AD' };
      function trendDS(key, label){
        return {
          label:label,
          data: points.map(function(p){ return p[key]; }),
          borderColor: COLORS_TREND[key],
          backgroundColor: COLORS_TREND[key]+'22',
          borderWidth:2.5, pointRadius:5, pointHoverRadius:7,
          tension:0.3, fill:false
        };
      }

      _charts['trend'] = new Chart(trendEl, {
        type:'line',
        plugins:[ChartDataLabels],
        data:{
          labels: points.map(function(p){ return p.label; }),
          datasets:[ trendDS('cj','CJ'), trendDS('oem','OEM'), trendDS('svtt','SVTT'), trendDS('svpt','SVPT') ]
        },
        options:{
          responsive:true, maintainAspectRatio:false,
          interaction:{ mode:'index', intersect:false },
          plugins:{
            legend:{ position:'top', labels:{ font:{size:12,family:'Be Vietnam Pro,sans-serif'}, padding:14, usePointStyle:true }},
            datalabels:{
              anchor:'end', align:'top', offset:3,
              font:{ weight:'700', size:10.5, family:'JetBrains Mono,monospace' },
              color: function(ctx){ return COLORS_TREND[['cj','oem','svtt','svpt'][ctx.datasetIndex]]; },
              formatter: function(v){ return v > 0 ? v : ''; },
              backgroundColor:'rgba(255,255,255,0.75)',
              borderRadius:3, padding:{top:1,bottom:1,left:3,right:3}
            }
          },
          scales:{
            y:{ beginAtZero:true, grid:{color:'rgba(0,0,0,0.05)'}, ticks:{font:{size:11}} },
            x:{ grid:{color:'rgba(0,0,0,0.05)'}, ticks:{font:{size:11}} }
          },
          animation:{ duration:500 }
        }
      });
    }catch(err){
      console.error('Trend chart error', err);
      if(loadingEl) loadingEl.innerHTML = '<span style="color:var(--danger);font-size:12px;">Không thể tải dữ liệu xu hướng.</span>';
    }
  }

  /* ============ EXCEL EXPORT — format TX_NHANSU ============ */
  async function exportExcel(date){
    var btn = document.getElementById('export-btn');
    if(btn){ btn.disabled = true; btn.textContent = '⏳ Đang xuất…'; }
    setStatus('Đang tải dữ liệu để xuất Excel…', 'saving');

    try{
      var lineResults = [];
      for(var i=0;i<LINES.length;i++){
        var rec = await loadLineRecord(date, LINES[i]);
        lineResults.push({cfg:LINES[i], record:rec, totals:lineTotals(rec)});
      }

      var wb = XLSX.utils.book_new();

      // ---- Date parts for ngay column (e.g. "22-Jun") ----
      var parts = date.split('-');
      var MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      var ngayStr = parts[2] + '-' + MON[parseInt(parts[1],10)-1];

      // ---- Cell helpers ----
      function cs(v){ return String(v==null?'':v); }
      function cn(v){ return v==null||v===''?0:Number(v)||0; }
      function cpct(siso,hd){
        if(!siso) return '0%';
        return Math.round(((siso-hd)/siso)*1000)/10 + '%';
      }

      // ---- Title & header rows ----
      var HEADERS = ['ngay','line_id','ten_line','loai_nv','ke_hoach','si_so','hien_dien','vang','pct_vang','nhap_ns_moi','cat_ns','ten_nv_vang','ly_do_vang','ca_lan'];
      var TITLE   = 'TX_NHANSU — NHÂN SỰ HẰNG NGÀY  ★  nhập mỗi sáng';
      var NOTE    = 'Nhập cột A→N. Cột O (pct_vang) tự tính. Màu xanh = công thức, không sửa tay.';

      var dataRows = [];

      lineResults.forEach(function(lr){
        var rec  = lr.record;
        var cfg  = lr.cfg;
        var base = [ngayStr, cfg.lineId, cfg.tenLine];

        // --- helper to push one entity row ---
        function pushRow(loai, kehoach, siso, hd, ten_nv, ly_do, nhap, cat){
          var v = cn(siso); var h = cn(hd);
          dataRows.push(base.concat([
            loai,
            cn(kehoach),
            v,
            h,
            v - h,
            cpct(v, h),
            nhap != null ? cn(nhap) : '',
            cat  != null ? cn(cat)  : '',
            cs(ten_nv),
            cs(ly_do),
            'Ngày'
          ]));
        }

        // CJ row (carries nhapNsMoi / catNs)
        pushRow('CJ', rec.planCJ, rec.cj.siso, rec.cj.hiendien, rec.cj.ghichu, rec.cj.lydo, rec.nhapNsMoi, rec.catNs);

        // OEM partners — individual rows (loai_nv = partner label, e.g. TĐX, HTĐP…)
        var oemSiso=0, oemHd=0, oemNames=[], oemReasons=[];
        OEM.forEach(function(o){
          var r = rec.oem[o.key];
          oemSiso += cn(r.siso); oemHd += cn(r.hiendien);
          if(r.ghichu)  oemNames.push(r.ghichu);
          if(r.lydo)    oemReasons.push(o.label+': '+r.lydo);
        });
        // One aggregated OEM row (matches TX format showing CJ / OEM only)
        pushRow('OEM', rec.planOEM, oemSiso, oemHd, oemNames.join('; '), oemReasons.join('; '), null, null);

        // SVTT / SVPT rows
        SV.forEach(function(s){
          var r = rec[s.key];
          pushRow(s.label, '', r.siso, r.hiendien, r.ghichu, r.lydo, null, null);
        });
      });

      // ---- Build AOA (array of arrays) ----
      var aoa = [
        [TITLE],
        [NOTE],
        [],
        HEADERS
      ].concat(dataRows);

      var ws = XLSX.utils.aoa_to_sheet(aoa);

      // ---- Column widths ----
      ws['!cols'] = [
        {wch:9},{wch:10},{wch:22},{wch:8},{wch:10},{wch:7},{wch:10},{wch:6},{wch:9},{wch:12},{wch:7},{wch:30},{wch:30},{wch:7}
      ];

      // ---- Merge title across A1:N1 and A2:N2 ----
      ws['!merges'] = [
        {s:{r:0,c:0}, e:{r:0,c:13}},
        {s:{r:1,c:0}, e:{r:1,c:13}}
      ];

      XLSX.utils.book_append_sheet(wb, ws, 'TX_NHANSU');

      /* ---- Download ---- */
      var fileName = 'TX_NHANSU_'+date+'.xlsx';
      XLSX.writeFile(wb, fileName);
      setStatus('✓ Đã xuất file '+fileName, 'saved');

    }catch(err){
      console.error('Export failed', err);
      setStatus('Xuất Excel thất bại: '+(err.message||err), 'error');
    }finally{
      if(btn){ btn.disabled = false; btn.textContent = '📥 Xuất Excel'; }
    }
  }

  /* ============ DATE CONTROL ============ */
  function initDateControl(){
    var picker = document.getElementById('date-picker');
    picker.value = state.date;
    document.getElementById('date-display').textContent = formatDateVi(state.date);
    picker.addEventListener('change', function(){
      if(state.dirty[state.tab]){
        var ok = confirm('Bạn có thay đổi chưa lưu. Đổi ngày và bỏ qua thay đổi?');
        if(!ok){ picker.value = state.date; return; }
        state.dirty[state.tab] = false;
      }
      state.date = picker.value || todayStr();
      document.getElementById('date-display').textContent = formatDateVi(state.date);
      renderTabs();
      renderActiveTab();
    });
  }

  /* ============ INIT ============ */
  function init(){
    if(!FIREBASE_CONFIGURED || !db){
      var banner = document.getElementById('config-banner');
      if(banner) banner.className = 'config-banner show';
    }
    renderTabs();
    initDateControl();
    renderActiveTab();
    window.addEventListener('beforeunload', function(e){
      var anyDirty = Object.keys(state.dirty).some(function(k){ return state.dirty[k]; });
      if(anyDirty){ e.preventDefault(); e.returnValue=''; }
    });
  }
  init();
})();
</script>
